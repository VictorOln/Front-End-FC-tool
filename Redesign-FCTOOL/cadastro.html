<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCTOOL - Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="cadastro-page">

    <!-- Faixa bicolor de fundo -->
    <div class="background-stripe"></div>

    <!-- Container do Card -->
    <div class="card cadastro-card-modern shadow-lg border-0 col-11 col-sm-8 col-md-6 col-lg-3">
        <div class="card-body p-4 p-md-5">
            <h2 class="fw-bold mb-4 fs-3 cadastro-title text-center">Criar Conta</h2>

            <form method="POST" action="">
                <div class="mb-3 input-fctool-modern">
                    <input type="text" name="nomeprimeiro" class="form-control" placeholder="Nome" required>
                </div>

                <div class="mb-3 input-fctool-modern">
                    <input type="text" name="sobrenome" class="form-control" placeholder="Sobrenome" required>
                </div>

                <div class="mb-3 input-fctool-modern">
                    <input type="text" name="username" class="form-control" placeholder="Usuário" required>
                </div>

                <div class="mb-3 input-fctool-modern">
                    <input type="email" name="email" class="form-control" placeholder="E-mail" required>
                </div>

                <div class="mb-4 input-fctool-modern">
                    <input type="password" name="password" class="form-control" placeholder="Senha" required>
                </div>

                <div class="d-flex justify-content-between mb-4 px-1">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_aluno" id="checkAluno">
                        <label class="form-check-label small text-muted" for="checkAluno">Aluno(a)</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_professor" id="checkProf">
                        <label class="form-check-label small text-muted" for="checkProf">Professor(a)</label>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <small class="text-muted">Já tem uma conta? <a href="login.html" class="link-fctool fw-bold text-decoration-none">Conecte-se</a></small>
                </div>

                <button type="submit" class="btn btn-primary-modern w-100 fw-bold py-2 mb-3">
                    CADASTRAR
                </button>

                <div class="text-center text-muted extra-small mb-3">ou</div>

                <a href="index.html" class="btn btn-google-modern w-100">
                    <i class="bi bi-google me-2"></i> 
                    <span>ENTRAR COM O GOOGLE</span>
                </a>
            </form>

            <div class="text-center mt-4 px-2">
                <p class="extra-small text-muted mb-0" style="line-height: 1.4; font-size: 0.7rem;">
                    Ao se cadastrar, você concorda com os nossos 
                    <span style="color: #bc8cc4;">Termos</span>, 
                    <span style="color: #bc8cc4;">Política de Dados</span> e 
                    <span style="color: #bc8cc4;">Política de Cookies</span>.
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
