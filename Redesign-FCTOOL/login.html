<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCTOOL - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="login-page d-flex align-items-center justify-content-center vh-100">

    <div class="background-stripe"></div>

    <!-- Reduzi para col-lg-3 para ficar mais "slim" -->
    <div class="welcome-card shadow-lg p-4 login-card-bs col-11 col-sm-6 col-md-5 col-lg-3">
        
        <div class="text-center mb-2">
            <img src="./assets/img/logoLogin.png" alt="Logo" class="img-fluid" style="max-width: 65px;">
        </div>
        
        <h2 class="text-center fw-bold mb-4 fs-4">Login</h2>

        <form>
    <div class="mb-3 position-relative d-flex align-items-center">
        <input type="text" name="usuario" class="form-control rounded-pill ps-3 custom-form-control" placeholder="Usuário">
        <i class="bi bi-person position-absolute end-0 me-3 text-secondary"></i>
    </div>

    <div class="mb-3 position-relative d-flex align-items-center">
        <input type="password" name="senha" class="form-control rounded-pill ps-3 custom-form-control" placeholder="Senha">
        <i class="bi bi-lock position-absolute end-0 me-3 text-secondary"></i>
    </div>

    <div class="text-center mb-4">
        <a href="#" class="text-decoration-none fw-bold extra-small link-fctool">Esqueceu a senha?</a>
    </div>

    
    <a href="index.html" class="btn btn-primary-fctool w-100 rounded-pill fw-bold py-2 mb-3 d-flex align-items-center justify-content-center">
        ENTRAR
    </a>

    <div class="text-center text-muted extra-small mb-3">ou</div>


    <a href="index.html" class="btn btn-outline-dark w-100 rounded-pill py-2 d-flex align-items-center justify-content-center gap-2 extra-small">
        <i class="bi bi-google"></i> ENTRAR COM O GOOGLE
    </a>
</form>

        <div class="text-center mt-4">
            <p class="mb-0 extra-small text-muted">
                Não tem conta? <a href="cadastro.html" class="text-decoration-none fw-bold link-fctool">Cadastre-se</a>
            </p>
        </div>

    </div>

</body>
</html>
